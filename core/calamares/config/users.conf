# users.conf — Calamares users module configuration for Bloom OS
# The OS user is always "pi". The user types only a password on the users page.
---
defaultGroups:
  - users
  - wheel
  - networkmanager
  - audio
  - video

# Preset the username to "pi". The field is pre-filled; the user should not change it.
# NOTE: If the user changes the displayed username, chpasswd will fail silently since
# dont_create_user=true prevents creating the typed name. The pi user will have no
# password and will fall back to the autologin path in bloom-shell.nix.
user:
  shell: /run/current-system/sw/bin/bash
  login: "pi"
  forbidden_names: []

# CRITICAL: pi already exists after nixos-install (declared in bloom-shell.nix).
# Without this flag, the users exec module calls `useradd pi` which fails with
# "user already exists". Setting this to true makes it only run chpasswd.
dont_create_user: true

autologin_group:
sudoers_group: wheel

hostname_action: none
