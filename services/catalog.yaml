version: 1
source_repo: https://github.com/alexradunet/piBloom
services:
  fluffychat:
    version: "0.1.0"
    category: messaging
    image: localhost/bloom-fluffychat:latest
    optional: true
    home_visible: true
    port: 8081
    title: Bloom Web Chat
    description: FluffyChat web client preconfigured for this Bloom node
    icon_text: MX
    access_path: /
    preflight:
      commands: [podman, systemctl]
  dufs:
    version: "0.1.0"
    category: sync
    image: docker.io/sigoden/dufs:v0.38.0
    optional: false
    home_visible: true
    port: 5000
    title: Bloom Files
    description: WebDAV share for the intentional cross-device Bloom folder
    icon_text: FS
    path_hint: ~/Public/Bloom
    access_path: /
    preflight:
      commands: [podman, systemctl]
  code-server:
    version: "0.1.0"
    category: development
    image: localhost/bloom-code-server:latest
    optional: true
    home_visible: true
    port: 8443
    title: Code Server
    description: Browser-based code editor running on the Bloom node
    icon_text: VS
    path_hint: /home/coder/project
    access_path: /
    preflight:
      commands: [podman, systemctl]

bridges:
  whatsapp:
    image: dock.mau.dev/mautrix/whatsapp:v26.02
    auth_method: qr_code
    health_port: 29318
    description: Bridge WhatsApp conversations to Matrix
  telegram:
    image: dock.mau.dev/mautrix/telegram:v0.15.3
    auth_method: phone_code
    health_port: 29300
    description: Bridge Telegram conversations to Matrix
  signal:
    image: dock.mau.dev/mautrix/signal:v26.02.2
    auth_method: qr_code
    health_port: 29328
    description: Bridge Signal conversations to Matrix
