version: 1
source_repo: https://github.com/pibloom/pi-bloom
services:
  lemonade:
    version: "0.1.0"
    category: ai
    image: ghcr.io/lemonade-sdk/lemonade-server:v9.4.1
    optional: false
    preflight:
      commands: [podman, systemctl]
  whatsapp:
    version: "0.3.0"
    category: communication
    image: localhost/bloom-whatsapp:latest
    optional: true
    depends: [lemonade]
    preflight:
      commands: [podman, systemctl]
  signal:
    version: "0.1.0"
    category: communication
    image: localhost/bloom-signal:latest
    optional: true
    depends: [lemonade]
    preflight:
      commands: [podman, systemctl]
  dufs:
    version: "0.1.0"
    category: sync
    image: docker.io/sigoden/dufs:latest
    optional: false
    preflight:
      commands: [podman, systemctl]
