version: 1
source_repo: https://github.com/pibloom/pi-bloom
services:
  lemonade:
    version: "0.1.0"
    category: ai
    image: ghcr.io/lemonade-sdk/lemonade-server:v9.4.1
    optional: false
    preflight:
      commands: [podman, systemctl]
  matrix:
    version: "0.1.0"
    category: communication
    image: forgejo.ellis.link/continuwuation/continuwuity:latest
    optional: false
    preflight:
      commands: [podman, systemctl]
  element:
    version: "0.1.0"
    category: communication
    image: localhost/bloom-element:latest
    optional: false
    depends: [matrix, lemonade]
    preflight:
      commands: [podman, systemctl]
  dufs:
    version: "0.1.0"
    category: sync
    image: docker.io/sigoden/dufs:latest
    optional: false
    preflight:
      commands: [podman, systemctl]
  code-server:
    version: "0.1.0"
    category: development
    image: localhost/bloom-code-server:latest
    optional: true
    preflight:
      commands: [podman, systemctl]
