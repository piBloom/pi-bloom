version: 1
source_repo: https://github.com/pibloom/pi-bloom
services:
  dufs:
    version: "0.1.0"
    category: sync
    image: docker.io/sigoden/dufs:v0.38.0
    optional: false
    port: 5000
    gateway_path: /webdav
    gateway_strip_prefix: true
    preflight:
      commands: [podman, systemctl]
  gateway:
    version: "0.1.0"
    category: communication
    image: localhost/bloom-gateway:latest
    optional: false
    port: 18810
    preflight:
      commands: [podman, systemctl]
  code-server:
    version: "0.1.0"
    category: development
    image: localhost/bloom-code-server:latest
    optional: true
    port: 8443
    gateway_path: /code
    gateway_strip_prefix: true
    preflight:
      commands: [podman, systemctl]

bridges:
  whatsapp:
    image: dock.mau.dev/mautrix/whatsapp:v26.02
    auth_method: qr_code
    health_port: 29318
    description: Bridge WhatsApp conversations to Matrix
  telegram:
    image: dock.mau.dev/mautrix/telegram:v0.15.3
    auth_method: phone_code
    health_port: 29300
    description: Bridge Telegram conversations to Matrix
  signal:
    image: dock.mau.dev/mautrix/signal:v26.02.2
    auth_method: qr_code
    health_port: 29328
    description: Bridge Signal conversations to Matrix
