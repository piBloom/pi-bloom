name: check

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quick-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: cachix/install-nix-action@7be5dee1421f63d07e71ce6e0a9f8a4b07c2a487 # v31.6.1
      - uses: actions/setup-node@0a44ba7841725637a19e28fa30b79a866c81b0a6 # v4.0.4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install node dependencies
        run: npm ci
      - name: Run TypeScript validation
        run: npx tsc --noEmit
      - name: Run Biome CI checks
        run: npm run check:ci
      - name: Build config check
        run: nix build .#checks.x86_64-linux.config --no-link -L
      - name: Build flake topology check
        run: nix build .#checks.x86_64-linux.flake-topology --no-link -L
      - name: Build VPS topology check
        run: nix build .#checks.x86_64-linux.vps-topology --no-link -L
