name: Build Bloom OS

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * SUN'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  IMAGE_NAME: bloom-os
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SIGNING_SECRET: ${{ secrets.SIGNING_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install JS dependencies
        run: npm ci

      - name: TypeScript build
        run: npm run build

      - name: Biome check
        run: npm run check

      - name: Run CI test suite
        run: npm run test:ci

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-os-coverage
          path: coverage/
          if-no-files-found: warn

      - name: Lint OS build scripts
        run: shellcheck core/os/build_files/*.sh core/os/packages/repos.sh

      - name: Get current date
        id: date
        run: echo "date=$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Build OS image
        run: |
          podman build -f core/os/Containerfile \
            --cap-add SYS_ADMIN \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest.${{ steps.date.outputs.date }} \
            .

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        run: |
          podman push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          podman push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          podman push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest.${{ steps.date.outputs.date }}

      - name: Install Cosign
        if: ${{ env.SIGNING_SECRET != '' }}
        uses: sigstore/cosign-installer@v4.0.0

      - name: Sign container image
        if: ${{ env.SIGNING_SECRET != '' }}
        env:
          COSIGN_PRIVATE_KEY: ${{ env.SIGNING_SECRET }}
        run: |
          cosign sign -y --key env://COSIGN_PRIVATE_KEY \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
